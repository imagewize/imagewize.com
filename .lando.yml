name: imagewize
recipe: wordpress
config:
  php: '8.2'
  composer_version: 2-latest
  via: nginx
  webroot: ./site/web
  database: mariadb
  xdebug: true
proxy:
  appserver_nginx:
    - imagewize.lndo.site # default
    - imagewize.test # for testing
  phpmyadmin:
    - pma.imagewize.lndo.site # default
    - pma.imagewize.test # for testing
  mailhog:
    - mail.imagewize.lndo.site # default
    - mail.imagewize.test # for testing
services:
  database:
    type: mariadb
    portforward: 3306
  phpmyadmin:
    type: phpmyadmin
    hosts:
      - database
  mailhog:
    type: mailhog
    hogfrom:
      - appserver_nginx
  