services:

  php:
    build:
      context: ../container
      dockerfile: Dockerfile
    volumes:
      - ../site:/srv/www
      - /tmp:/tmp
      - node_binaries:/usr/local/node:ro  # Added read-only flag
      - volta_home:/usr/local/volta:ro
    environment:
      - PATH=/usr/local/node/bin:/usr/local/volta/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VOLTA_HOME=/usr/local/volta
    networks:
      - app-network
    depends_on:
      - node

  nginx:
    image: nginx:1.19.2
    volumes:
      - ../site:/srv/www
      - ./nginx/config/app.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - php

  db:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: test
    ports:
      - "3307:3306"
    volumes:
      - ./db/data:/var/lib/mysql
    networks:
      - app-network

  node:
    build:
      context: ../container/node
      dockerfile: Dockerfile
    volumes:
      - ../site:/srv/www
      - node_binaries:/usr/local/node
      - volta_home:/usr/local/volta
    environment:
      - PATH=/usr/local/node/bin:/usr/local/volta/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VOLTA_HOME=/usr/local/volta
    tty: true
    stdin_open: true
    command: tail -f /dev/null
    networks:
      - app-network

volumes:
  node_binaries:
  volta_home:

networks:
  app-network:
    driver: bridge


